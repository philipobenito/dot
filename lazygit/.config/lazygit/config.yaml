os:
  edit: 'nvr --remote-tab {{filename}}'
  editAtLine: 'nvr --remote-tab +{{line}} {{filename}}'
  editAtLineAndWait: 'nvr --remote-tab-wait +{{line}} {{filename}}'
  editInTerminal: false
  openDirInEditor: 'nvr --remote-tab {{dir}}'
git:
  pagers:
    - colorArg: always
      pager: diff-so-fancy
gui:
  showFileTree: false
  theme:
    activeBorderColor:
      - '#89b4fa'
      - bold
    inactiveBorderColor:
      - '#a6adc8'
    optionsTextColor:
      - '#89b4fa'
    selectedLineBgColor:
      - '#313244'
    cherryPickedCommitBgColor:
      - '#45475a'
    cherryPickedCommitFgColor:
      - '#89b4fa'
    unstagedChangesColor:
      - '#f38ba8'
    defaultFgColor:
      - '#cdd6f4'
    searchingActiveBorderColor:
      - '#f9e2af'
  authorColors:
    '*': '#b4befe'
